; Embed

; Global config/security/performance
;zend.enable_gc = 1
date.timezone = "UTC"
max_execution_time = 0
allow_url_fopen = 1
allow_url_include = 0
register_globals = 0
safe_mode = 0
safe_mode_gid = 0
expose_php = 0
phar.readonly = 0
default_charset = "UTF-8"
memory_limit = -1
max_input_time = -1
;curl.cainfo="C:\dev\027e95115cf6ac1119126ca95379de1b\windows\windows-kernel\php8\cacert.pem"

; Error logging
error_reporting=E_ALL
display_errors = 1
display_startup_errors = 1
log_errors = 1
error_log = "../logs/bearsampp-runner.log"
winbinder.debug_level = 1
winbinder.low_level_functions = 1

; Extensions
extension_dir="./ext"

; php dlls
extension=mbstring
extension=openssl
extension=pgsql
extension=curl
extension=mysqli
extension=memcache

; Windows
extension=winbinder
extension=win32ps
extension=win32service
;extension=win32std

; asset unit tests
assert.exception=1
assert.warning=0

# Enabling JIT in php.ini
opcache.enable=0
opcache.enable_cli=0
opcache.jit_buffer_size=100M
opcache.jit=tracing